name: Neon Preview Branch + Coolify Deploy

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  setup:
    name: Setup
    outputs:
      branch: ${{ steps.branch_name.outputs.current_branch }}
    runs-on: ubuntu-latest
    steps:
      - name: Get branch name
        id: branch_name
        uses: tj-actions/branch-names@v8

  create_neon_branch:
    name: Create Neon Branch
    needs: setup
    if: >-
      github.event_name == 'pull_request' && (
      github.event.action == 'synchronize'
      || github.event.action == 'opened'
      || github.event.action == 'reopened')
    runs-on: ubuntu-latest
    outputs:
      db_url: ${{ steps.create_neon_branch.outputs.db_url }}
      db_url_with_pooler: ${{ steps.create_neon_branch.outputs.db_url_with_pooler }}
      branch_host: ${{ steps.parse_endpoint.outputs.host }}
    steps:
      - name: Get branch expiration date (2 weeks)
        id: get_expiration_date
        run: echo "EXPIRES_AT=$(date -u --date '+14 days' +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"

      - name: Create Neon Branch
        id: create_neon_branch
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch_name: preview/pr-${{ github.event.number }}-${{ needs.setup.outputs.branch }}
          api_key: ${{ secrets.NEON_API_KEY }}
          expires_at: ${{ env.EXPIRES_AT }}

      - name: Parse endpoint from db_url
        id: parse_endpoint
        run: |
          DB_URL="${{ steps.create_neon_branch.outputs.db_url }}"
          echo "Raw db_url: ${DB_URL:0:30}..."
          HOST=$(echo "$DB_URL" | sed -E 's|.*@([^/]+).*|\1|')
          echo "Parsed host: $HOST"
          echo "host=$HOST" >> "$GITHUB_OUTPUT"

          ENDPOINT=$(echo "$HOST" | cut -d'.' -f1)
          REGION_AND_SUFFIX=$(echo "$HOST" | sed "s/${ENDPOINT}\.//")
          echo "endpoint=$ENDPOINT" >> "$GITHUB_OUTPUT"
          echo "region_suffix=$REGION_AND_SUFFIX" >> "$GITHUB_OUTPUT"

          AUTH_URL="https://${ENDPOINT}.neonauth.${REGION_AND_SUFFIX}/neondb/auth"
          DATA_API_URL="https://${ENDPOINT}.apirest.${REGION_AND_SUFFIX}/neondb/rest/v1"

          echo "auth_url=$AUTH_URL" >> "$GITHUB_OUTPUT"
          echo "data_api_url=$DATA_API_URL" >> "$GITHUB_OUTPUT"
          echo ""
          echo "=== Preview Branch URLs ==="
          echo "Auth:     $AUTH_URL"
          echo "Data API: $DATA_API_URL"

      - name: Update Coolify preview env vars
        env:
          COOLIFY_URL: ${{ vars.COOLIFY_URL }}
          COOLIFY_APP_UUID: ${{ vars.COOLIFY_APP_UUID }}
          COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
          AUTH_URL: ${{ steps.parse_endpoint.outputs.auth_url }}
          DATA_API_URL: ${{ steps.parse_endpoint.outputs.data_api_url }}
        run: |
          echo "Updating Coolify preview env vars..."

          update_env() {
            local key="$1" value="$2"
            printf '{"key":"%s","value":"%s","is_preview":true}' "$key" "$value" > /tmp/payload.json
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              -X PATCH "${COOLIFY_URL}/api/v1/applications/${COOLIFY_APP_UUID}/envs" \
              -H "Authorization: Bearer ${COOLIFY_API_TOKEN}" \
              -H "Content-Type: application/json" \
              -H "Accept: application/json" \
              -d @/tmp/payload.json)
            echo "${key} -> HTTP ${HTTP_CODE}"
          }

          update_env "VITE_NEON_AUTH_URL" "${AUTH_URL}"
          update_env "VITE_NEON_DATA_API_URL" "${DATA_API_URL}"

          echo "Done updating Coolify env vars"

      - name: Comment preview URLs on PR
        uses: actions/github-script@v7
        with:
          script: |
            const authUrl = '${{ steps.parse_endpoint.outputs.auth_url }}';
            const dataApiUrl = '${{ steps.parse_endpoint.outputs.data_api_url }}';
            const branchName = 'preview/pr-${{ github.event.number }}-${{ needs.setup.outputs.branch }}';
            const comment = `## 🌿 Neon Preview Branch Created

            **Branch:** \`${branchName}\`

            | Variable | URL |
            |---|---|
            | Auth URL | \`${authUrl}\` |
            | Data API URL | \`${dataApiUrl}\` |

            Coolify preview env vars updated. Preview deployment will use these URLs.`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  delete_neon_branch:
    name: Delete Neon Branch
    needs: setup
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Delete Neon Branch
        uses: neondatabase/delete-branch-action@v3
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch: preview/pr-${{ github.event.number }}-${{ needs.setup.outputs.branch }}
          api_key: ${{ secrets.NEON_API_KEY }}

      - name: Reset Coolify preview env vars to production
        env:
          COOLIFY_URL: ${{ vars.COOLIFY_URL }}
          COOLIFY_APP_UUID: ${{ vars.COOLIFY_APP_UUID }}
          COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
        run: |
          PROD_AUTH="https://ep-morning-unit-ao8tb312.neonauth.c-2.ap-southeast-1.aws.neon.tech/neondb/auth"
          PROD_DATA_API="https://ep-morning-unit-ao8tb312.apirest.c-2.ap-southeast-1.aws.neon.tech/neondb/rest/v1"

          update_env() {
            local key="$1" value="$2"
            printf '{"key":"%s","value":"%s","is_preview":true}' "$key" "$value" > /tmp/payload.json
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              -X PATCH "${COOLIFY_URL}/api/v1/applications/${COOLIFY_APP_UUID}/envs" \
              -H "Authorization: Bearer ${COOLIFY_API_TOKEN}" \
              -H "Content-Type: application/json" \
              -H "Accept: application/json" \
              -d @/tmp/payload.json)
            echo "${key} -> HTTP ${HTTP_CODE}"
          }

          update_env "VITE_NEON_AUTH_URL" "${PROD_AUTH}"
          update_env "VITE_NEON_DATA_API_URL" "${PROD_DATA_API}"

          echo "Preview env vars reset to production values"
